  <link rel="stylesheet" href="./src/output.css">
</head>
<body>

  <nav class="bg-black text-white px-6 py-4 flex items-center justify-between">

  <div class="hidden md:flex items-center gap-8 text-sm font-medium text-gray-300">

    <a href="#" class="hover:text-white transition-colors">Services</a>

    <div class="space-y-8 order-2 md:order-1">
      <h1 class="text-4xl md:text-6xl font-extrabold leading-tight tracking-tight">
        Transforming Data <br>
        into <span class="bg-blue-600 px-4 py-1 rounded-lg inline-block mt-2">Decisions</span>
      </h1>
      
      <p class="text-gray-400 text-lg max-w-md">

      </p>

      <button class="bg-blue-600 hover:bg-blue-500 text-white px-8 py-3 rounded-md font-semibold transition-all">

      <div class="flex items-center gap-4">
        <div class="flex -space-x-3">
        
          <img class="w-10 h-10 rounded-full border-2 border-black" src="./img/image small 1.png" alt="Client">
          <img class="w-10 h-10 rounded-full border-2 border-black" src="./img/image small 2.png" alt="Client">
          <img class="w-10 h-10 rounded-full border-2 border-black" src="./img/image small 3.png" alt="Client">
        </div>
        <p class="text-sm text-gray-400">
          Over <span class="text-white font-bold">100+ clients</span> have worked with us
        </p>
      </div>
    </div>


    <div class="order-1 md:order-2 flex justify-center">

<section class="bg-black py-12 px-6">

    <div class="border-t border-gray-800/50 mb-10"></div>

      <div class="w-24 md:w-32 flex justify-center">
        <img src="./img/Zapier.png" alt="Zapier" class="h-6 md:h-8 object-contain">

        <img src="./img/Slack.png" alt="Slack" class="h-6 md:h-8 object-contain">

      <div class="w-24 md:w-32 flex justify-center">
        <img src="./img/Slack.png" alt="Amazon" class="h-6 md:h-8 object-contain">
