<!DOCTYPE html>

</head>
<body>

  <!-- Header -->
    <nav class="bg-black text-white px-6 py-5 flex items-center justify-between sticky top-0 z-50 border-b border-white/5">
  
  <div class="flex items-center gap-3">
    
    <img src="../img/Logo.png" alt="Catalyst Analytics" class="h-8 md:h-10">
    <span class="font-bold text-lg tracking-tight hidden sm:block">
      Catalyst Analytics
    </span>
  </div>

  <div class="hidden md:flex items-center gap-8 text-sm font-medium text-gray-400">
    <a href="#" class="hover:text-white transition-colors">Home</a>
    <a href="#" class="hover:text-white transition-colors">Services</a>
    <a href="#" class="hover:text-white transition-colors">Careers</a>
    <a href="#" class="hover:text-white transition-colors">Career Details</a>
    <a href="#" class="hover:text-white transition-colors">Contact</a>
  </div>


  <div class="flex items-center gap-4">
    <a href="#" class="bg-[#1d84ff] hover:bg-blue-500 text-white px-6 py-2.5 rounded-xl text-sm font-bold transition-all shadow-[0_0_20px_rgba(29,132,255,0.3)]">
      Contact Us
    </a>
    

    <button class="md:hidden text-white">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path>
      </svg>

<!-- Section 2 -->
<section class="bg-black py-20 px-6">
  <div class="max-w-7xl mx-auto">
    
    <div class="relative bg-[#111111] rounded-[48px] border border-white/5 overflow-hidden p-10 md:p-20 flex flex-col md:flex-row items-center justify-between gap-12">
      
      
      <div class="absolute inset-0 opacity-20 pointer-events-none" 
           style="background-image: linear-gradient(#333 1px, transparent 1px), linear-gradient(90deg, #333 1px, transparent 1px); background-size: 80px 80px;">
      </div>

   
      <div class="relative z-10 space-y-6 text-center md:text-left max-w-xl">
        <h2 class="text-3xl md:text-5xl font-bold text-white leading-tight">

        <p class="text-gray-400 text-sm md:text-base leading-relaxed">
          We're a team of builders, thinkers, and explorers using AI, machine learning, and blockchain to solve meaningful problems.
        </p>
        <button class="bg-[#1d84ff] hover:bg-blue-500 text-white px-8 py-3 rounded-xl font-bold text-sm transition-all shadow-[0_0_20px_rgba(29,132,255,0.3)]">

        </button>
      </div>

      <div class="relative z-10 flex justify-center w-full md:w-auto">
       
        <img src="../img/Bag photo.png" alt="Join our team" 
             class="w-full max-w-[280px] md:max-w-[400px] h-auto object-contain drop-shadow-[0_20px_50px_rgba(0,0,0,0.5)] transform md:scale-110">

    </div>
