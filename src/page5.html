<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page 5</title>
  <link rel="stylesheet" href="./output.css">
</head>
<body>

  <!-- Header -->
  <nav class="bg-black text-white h-20 px-6 md:px-12 flex items-center justify-between sticky top-0 z-50 border-b border-white/5">
  
  <div class="flex items-center gap-3 shrink-0">

    <img src="../img/Logo.png" alt="Catalyst Analytics" class="h-10 w-auto">
    <div class="leading-none font-bold text-lg tracking-tight">
      Catalyst<br><span class="text-sm">Analytics</span>
    </div>
  </div>

  <div class="hidden md:flex items-center gap-8 text-[13px] font-medium text-gray-400">
    <a href="#" class="hover:text-white transition-colors">Home</a>
    <a href="#" class="hover:text-white transition-colors">Services</a>
    <a href="#" class="hover:text-white transition-colors">Careers</a>
    <a href="#" class="hover:text-white transition-colors">Career Details</a>
    <a href="#" class="hover:text-white transition-colors">Contact</a>
  </div>

  <div class="shrink-0">
    <a href="#" class="bg-[#1d84ff] hover:bg-blue-500 text-white px-7 py-2.5 rounded-xl text-xs md:text-sm font-bold transition-all shadow-[0_4px_20px_rgba(29,132,255,0.3)] inline-block">
      Contact Us
    </a>
  </div>

  <button class="md:hidden p-2 text-gray-400">
    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path>
    </svg>
  </button>

</nav>




<!-- Section 2 -->
<section class="bg-black py-20 px-6">
  <div class="max-w-7xl mx-auto">
   
    <div class="relative bg-[#111111] rounded-[48px] border border-white/5 overflow-hidden p-10 md:p-20 flex flex-col md:flex-row items-center justify-between gap-12">
      
      <div class="absolute inset-0 opacity-10 pointer-events-none" 
           style="background-image: linear-gradient(#444 1px, transparent 1px), linear-gradient(90deg, #444 1px, transparent 1px); background-size: 60px 60px;">
      </div>

      <div class="absolute right-0 bottom-0 w-64 h-64 bg-blue-600/10 blur-[100px] pointer-events-none"></div>

      <div class="relative z-10 space-y-6 text-center md:text-left max-w-md">
        <h2 class="text-4xl md:text-5xl font-bold text-white tracking-tight">
          Contact Us
        </h2>
        <p class="text-gray-400 text-sm md:text-base leading-relaxed">
          Get in touch with our team to discuss how we can help transform your business. We're here to help.
        </p>
        <button class="bg-[#1d84ff] hover:bg-blue-500 text-white px-8 py-3.5 rounded-xl font-bold text-sm transition-all shadow-[0_0_25px_rgba(29,132,255,0.3)] hover:scale-105 active:scale-95">
          Get In Touch Now
        </button>
      </div>

      <div class="relative z-10 flex justify-center w-full md:w-auto">

        <img src="../img/Message photo.png" alt="Contact Icon" 
             class="w-full max-w-[300px] md:max-w-[450px] h-auto object-contain drop-shadow-[0_20px_50px_rgba(0,0,0,0.5)] transform md:scale-110">
      </div>

    </div>
  </div>
</section>



</body>
</html>
